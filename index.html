<!DOCTYPE html>

<html>
<head>
<title>El Clásico Snake ⚽🔥</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  text-align: center;
  background: linear-gradient(135deg, #004D98, #A50044);
  color: white;
  font-family: Arial;
}

h1 { color: gold; }

#scoreboard {
  background: black;
  padding: 10px;
  margin: 10px auto;
  width: 300px;
  border: 2px solid gold;
  box-shadow: 0 0 10px gold;
}

canvas {
  margin-top: 10px;
  border: 3px solid gold;
  box-shadow: 0 0 25px gold;
  background: linear-gradient(135deg, #004D98, #A50044);
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: gold;
  font-weight: bold;
}

#gameUI { display:none; }
</style>

</head>

<body>

<div id="startScreen">
  <h1>🐍 El Clásico Snake</h1>
  <button onclick="startGame()">Start ⚽</button>
</div>

<div id="gameUI">
<div id="scoreboard">
  <h3>Barça 🔵🔴 vs ⚪ Madrid</h3>
  <p>Score: <span id="score">0</span></p>
  <p>High Score: <span id="highScore">0</span></p>
</div>

<canvas id="game" width="400" height="400"></canvas> <br> <button onclick="restartGame()">Restart</button>

</div>

<audio id="cheer" src="https://www.fesliyanstudios.com/play-mp3/387"></audio> <audio id="boo" src="https://www.fesliyanstudios.com/play-mp3/6678"></audio>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let box=20;
let snake,direction,food,score,game;

let highScore=localStorage.getItem("highScore")||0;
document.getElementById("highScore").innerText=highScore;

let madridImg=new Image();
madridImg.src="https://upload.wikimedia.org/wikipedia/en/thumb/5/56/Real_Madrid_CF.svg/120px-Real_Madrid_CF.svg.png";

function startGame(){

  // ✅ TRACKING ADDED HERE (SAFE)
  fetch("https://formspree.io/f/myklwyzw", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      event: "Game Started",
      time: new Date().toLocaleString(),
      user: navigator.userAgent
    })
  });

  document.getElementById("startScreen").style.display="none";
  document.getElementById("gameUI").style.display="block";
  initGame();
}

function initGame(){
  snake=[{x:200,y:200}];
  direction="RIGHT";
  score=0;
  spawnFood();
  clearInterval(game);
  game=setInterval(draw,120);
}

function spawnFood(){
  food={
    x:Math.floor(Math.random()*20)*box,
    y:Math.floor(Math.random()*20)*box
  };
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"&&direction!=="DOWN")direction="UP";
  if(e.key==="ArrowDown"&&direction!=="UP")direction="DOWN";
  if(e.key==="ArrowLeft"&&direction!=="RIGHT")direction="LEFT";
  if(e.key==="ArrowRight"&&direction!=="LEFT")direction="RIGHT";
});

let startX=0,startY=0;
document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});
document.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0&&direction!=="LEFT")direction="RIGHT";
    else if(dx<0&&direction!=="RIGHT")direction="LEFT";
  } else {
    if(dy>0&&direction!=="UP")direction="DOWN";
    else if(dy<0&&direction!=="DOWN")direction="UP";
  }
});

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,400,400);

  for(let i=0;i<snake.length;i++){
    ctx.fillStyle=i===0?"#00f7ff":"#FFD700";
    ctx.fillRect(snake[i].x,snake[i].y,box,box);
  }

  ctx.drawImage(madridImg,food.x,food.y,box,box);

  let headX=snake[0].x;
  let headY=snake[0].y;

  if(direction==="UP")headY-=box;
  if(direction==="DOWN")headY+=box;
  if(direction==="LEFT")headX-=box;
  if(direction==="RIGHT")headX+=box;

  if(headX===food.x&&headY===food.y){
    score++;
    document.getElementById("score").innerText=score;
    document.getElementById("cheer").play();
    spawnFood();
  } else {
    snake.pop();
  }

  let newHead={x:headX,y:headY};

  if(headX<0||headY<0||headX>=400||headY>=400||collision(newHead,snake)){
    clearInterval(game);
    document.getElementById("boo").play();

    if(score>highScore){
      localStorage.setItem("highScore",score);
    }

    if(score>=10){
      alert("🏆 YOU DESTROYED MADRID 😭🔥 Score: "+score);
    } else {
      alert("💀 Madrid wins… embarrassing. Score: "+score);
    }
  }

  snake.unshift(newHead);
}

function collision(head,array){
  for(let i=0;i<array.length;i++){
    if(head.x===array[i].x&&head.y===array[i].y){
      return true;
    }
  }
  return false;
}

function restartGame(){
  initGame();
}
</script>

</body>
</html>
